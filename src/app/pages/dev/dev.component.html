<div class="dev-controls">
  <div class="dev-class-selector">
    @for (cls of classList; track cls.id) {
      <button
        class="dev-class-btn"
        [class.selected]="selectedClass() === cls.id"
        [style.--cls-color]="cls.color"
        [attr.data-testid]="'dev-class-btn-' + cls.id"
        (click)="selectClass(cls.id)"
      >
        <span class="dev-class-icon">{{ cls.icon }}</span>
        <span class="dev-class-name">{{ cls.name }}</span>
      </button>
    }
  </div>
  <button
    class="dev-btn"
    data-testid="dev-level-btn-increase"
    (click)="levelUp()"
  >
    Level Up ({{ playerLevel() }})
  </button>
  <button
    class="dev-btn dev-btn--skills"
    data-testid="dev-skills-btn-max"
    (click)="maxAllSkills()"
  >
    Max All Skills
  </button>
  <button
    class="dev-btn dev-btn--maxout"
    data-testid="dev-maxout-btn-activate"
    (click)="maxOutPlayer()"
  >
    Max Out Player
  </button>
  <div class="dev-wave-control">
    <input
      class="dev-wave-input"
      type="number"
      min="1"
      data-testid="dev-floor-input"
      [ngModel]="floorInput()"
      (ngModelChange)="floorInput.set($event)"
    />
    <button
      class="dev-btn dev-btn--wave"
      data-testid="dev-floor-btn-set"
      (click)="setFloor()"
    >
      Set Floor
    </button>
  </div>
</div>
<app-game />
